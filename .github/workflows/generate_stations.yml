name: Générer stations.json manuellement

on:
  workflow_dispatch:  # lancement manuel
    inputs:
      adresse:
        description: "Adresse de référence"
        required: true
        type: string

      carburant:
        description: "Type de carburant (E10, SP95, etc.)"
        required: true
        type: string

      departements_a_scanner:
        description: "Départements CSV (ex: 92,78,91)"
        required: true
        type: string

      request_id:
        description: "ID de suivi côté Worker"
        required: true
        type: string

concurrency:
   group: prixcarb-${{ github.event.inputs.departements_a_scanner }}-${{ github.event.inputs.carburant }}
   cancel-in-progress: true

permissions:
  contents: write     # autorise le push sur le repo

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1) Récupérer le dépôt
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2) Installer Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

          
      - name: Install dependencies
        run: |
           python -m pip install --upgrade pip
           pip install requests beautifulsoup4

      # 2.5) Affichage des parametres transmis
      - name: Debug inputs
        run: |
           echo "Adresse        = ${{ github.event.inputs.adresse }}"
           echo "Carburant      = ${{ github.event.inputs.carburant }}"
           echo "Départements   = ${{ github.event.inputs.departements_a_scanner }}"


      # 3) Télécharger les données officielles (ZIP "flux instantané")
      #    Réf. open data : https://www.prix-carburants.gouv.fr/rubrique/opendata/
      - name: Download carburant data (XML in ZIP)
        run: |
          set -e
          curl -L -o data.zip "https://donnees.roulez-eco.fr/opendata/instantane"

      # 4) Extraire le XML
      - name: Extract XML
        run: |
          set -e
          unzip -o data.zip
          ls -l

      # 5) Script de conversion XML -> JSON filtré + calculs
      - name: Create convert.py
        run: |
          set -e
          cat > convert.py << 'EOF'
          import os
          import xml.etree.ElementTree as ET
          import math
          import requests, time, json
          from bs4 import BeautifulSoup
          
          # definition d'un fichier cache pour le nom des enseignes
          ENSEIGNE_CACHE_FILE = "enseigne_cache.json"
          HEADERS = {"User-Agent": "Mozilla/5.0"}

          def geocode_address(address):
            if not address:
               raise ValueError("Adresse vide, impossible de géocoder")

            url = "https://nominatim.openstreetmap.org/search"
            params = {"q": address, "format": "json", "limit": 1}
            headers = {"User-Agent": "prixcarb-github-actions"}

            r = requests.get(url, params=params, headers=headers, timeout=10)
            if r.status_code != 200:
               raise RuntimeError(f"Nominatim HTTP error {r.status_code}")

            data = r.json()
            if not data:
               raise ValueError(f"Aucun résultat pour l'adresse : {address}")

            lat = float(data[0]["lat"])
            lon = float(data[0]["lon"])

            # Respect politesse API
            time.sleep(1)

            return lat, lon          # --- parseur : extraction pure depuis soup ---
            
          def extract_enseigne_from_block(soup):
              # 1) ciblage précis d’après ton HTML : <div class="fr-pb-3v">Marque : ...</div>
              block = soup.find("div", class_="fr-pb-3v")
              if block:
                 parts = list(block.stripped_strings)
                 # ["Marque :", "TotalEnergies", "16 bd ...", "44200", "Nantes"]
                 if parts and parts[0].lower().startswith("marque"):
                    parts = parts[1:]
                 if parts:
                    return parts[0].strip()  # "TotalEnergies"
              return ""

          #definition de la fonction get_enseigne pour recuperer le nom de l'enseigne
          def get_enseigne(sid):
              if not sid:
                 return ""
                 
              # 0) cache disque
              cache = {}
              if os.path.exists(ENSEIGNE_CACHE_FILE):
                 try:
                    cache = json.load(open(ENSEIGNE_CACHE_FILE, "r", encoding="utf-8"))
                 except Exception:
                    cache = {}

              if sid in cache and cache[sid]:
                 return cache[sid]

              # 1) requete HTTP
              url = f"https://www.prix-carburants.gouv.fr/station/{sid}"
              try:
                 r = requests.get(url, timeout=10, headers={"User-Agent": "Mozilla/5.0"})
                 if r.status_code != 200:
                    return ""
                 # a) recupere le code source de la page
                 soup = BeautifulSoup(r.text, "html.parser")
                 enseigne = extract_enseigne_from_block(soup).strip()

                 # b) ecriture dans le fichier cache si enseigne trouvee
                 if enseigne:
                    cache[sid] = enseigne
                    try:
                       json.dump(cache, open(ENSEIGNE_CACHE_FILE, "w", encoding="utf-8"), ensure_ascii=False, indent=2)
                       return enseigne
                    except Exception:
                      print(f"Erreur ecriture fichier enseigne {enseigne} de l'id {sid} ...")
                      
              except Exception:
                 print(f"Erreur recup URL de l'id {sid} ...")

              return ""

          # --- paramètres dynamiques venant du workflow ---
          DEPS = set(os.environ.get("INPUT_DEPARTEMENTS", "").split(","))
          FUEL_TAG = os.environ.get("INPUT_CARBURANT", "E10")
          ADRESSE_REF = os.environ.get("INPUT_ADRESSE", "")
          
          print(f"Géocodage de l'adresse : {ADRESSE_REF}")
          REF_LAT, REF_LON = geocode_address(ADRESSE_REF)
          print(f"Coordonnées trouvées : lat={REF_LAT}, lon={REF_LON}")

          # --- paramètres statiques
          CONSO = 10                          # L/100 km
          VOLUME = 50                         # L

          def haversine(lat1, lon1, lat2, lon2):
              R = 6371
              dlat = math.radians(lat2 - lat1)
              dlon = math.radians(lon2 - lon1)
              a = (math.sin(dlat/2)**2 +
                   math.cos(math.radians(lat1)) *
                   math.cos(math.radians(lat2)) *
                   math.sin(dlon/2)**2)
              return 2 * R * math.asin(math.sqrt(a))

          xml_file = "PrixCarburants_instantane.xml"  # présent dans le ZIP officiel
          tree = ET.parse(xml_file)
          root = tree.getroot()

          stations_out = []

          for pdv in root.findall("pdv"):
              cp = pdv.get("cp")
              if not cp or cp[:2] not in DEPS:
                  continue

              id = pdv.get("id")
              print(f"Recherche enseigne a partir de l'id {id} ...")
              enseigne = get_enseigne(id)
              print(f"enseigne trouvee {enseigne} ...")
              # Coordonnées WGS84 *100000 -> diviser par 100000
              lat = float(pdv.get("latitude"))/100000
              lon = float(pdv.get("longitude"))/100000

              # Prix carburant ciblé
              prix_elem = None
              for p in pdv.findall("prix"):
                  if p.get("nom") == FUEL_TAG:
                      prix_elem = p
                      break
              if prix_elem is None:
                  continue

              # milli-euros/L -> €/L
              prix = float(prix_elem.get("valeur"))/1000

              dist = haversine(REF_LAT, REF_LON, lat, lon)
              cout_total = prix * VOLUME + (2*dist/100)*CONSO*prix

              # Pour l'affichage, on va chercher adresse/ville si elles existent
              stations_out.append({
                  "station": enseigne, 
                  "adresse": pdv.findtext("adresse") or "",
                  "ville": pdv.findtext("ville") or "",
                  "cp": cp,
                  "prix": prix,
                  "distance": dist,
                  "coutTotal": cout_total
              })

          with open("stations.json", "w", encoding="utf-8") as f:
              json.dump(stations_out, f, ensure_ascii=False, indent=2)

          print("OK : stations.json généré.")
          EOF

      # 6) Exécuter la conversion
      - name: Run convert.py
        env:
          INPUT_ADRESSE: ${{ github.event.inputs.adresse }}
          INPUT_CARBURANT: ${{ github.event.inputs.carburant }}
          INPUT_DEPARTEMENTS: ${{ github.event.inputs.departements_a_scanner }}
        run: |
          set -e
          python3 convert.py
          test -f stations.json && echo "stations.json présent"

      # 7) Commit + push uniquement si changements
      - name: Commit and push stations.json (if changed)
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stations.json
          if git diff --cached --quiet; then
            echo "Aucun changement pour le fichier des stations stations.json  à pousser."
          else
            git commit -m "Mise à jour du fichier des stations.json"
            git push
          fi
          git add enseigne_cache.json
          if git diff --cached --quiet; then
            echo "Aucun changement pour le fichier cache enseigne_cache.json  à pousser."
          else
            git commit -m "Mise à jour manuelle du fichier cache enseigne_cache.json"
            git push
          fi

      # 8) debug callback    
      - name: Callback status to Worker (always)
      if: always()
          run: |
          set -e
          payload=$(cat <<'JSON'
                    {
                     "request_id": "${{ github.event.inputs.request_id }}",
                     "conclusion": "${{ job.status }}",
                     "message": "Voir logs GitHub Actions",
                     "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                    JSON
                   )

          echo "Payload: $payload"

          http_code=$(curl -sS -o /tmp/cb_resp.txt -w "%{http_code}" \
            -X POST "https://prixcarb-workers.krinou.workers.dev/callback" \
            -H "Content-Type: application/json" \
            -H "X-Callback-Secret: ${{ secrets.CALLBACK_SECRET }}" \
            --data "$payload")

          echo "Callback HTTP = $http_code"
          echo "Callback body = $(cat /tmp/cb_resp.txt)"
