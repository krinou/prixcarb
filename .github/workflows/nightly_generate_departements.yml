name: Génération nocturne des prix carburants par département

on:
  schedule:
    # Tous les jours à 01:00 (heure UTC)
    # ⚠️ En France (UTC+1/UTC+2), ça correspond à 02h ou 03h locales
    - cron: "0 1 * * *"

  # Optionnel : permet de lancer à la main si besoin
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: prixcarb-nightly
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2) Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      # 3) Génération des fichiers par département
      - name: Generate nightly data (all departments)
        env:
          # Date ISO du jour (UTC)
          RUN_DATE: ${{ github.run_started_at }}
        run: |
          set -e
          echo "Date du run : $RUN_DATE"
          python scripts/generate_departements.py

      # 4) Commit + push si changements
      - name: Commit and push nightly data
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/
          if git diff --cached --quiet; then
            echo "Aucun changement à pousser."
          else
            git commit -m "Génération nocturne des prix carburants ($(date -u +%Y-%m-%d))"
            git push
          fi
