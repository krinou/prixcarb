<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stations – Classement carburants</title>

<!-- Bootstrap 5 (mise en forme professionnelle) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  th.sortable-header { cursor: pointer; user-select: none; }
  th.sort-asc::after  { content: " ▲"; font-size: 0.9em; color: #666; }
  th.sort-desc::after { content: " ▼"; font-size: 0.9em; color: #666; }
  #autocompleteList {
    max-height: 220px;
    overflow-y: auto;
    width: 100%;
    cursor: pointer;
  }
  #autocompleteList li:hover {
    background: #eee;
  } 
</style>

</head>

<button onclick="runStationsUpdate()">🔄 Mettre à jour les stations</button>

<script>
function runStationsUpdate() {
  fetch("https://prixcarb-workers.krinou.workers.dev/", {
    method: "POST"
  })
  .then(r => r.text())
  .then(msg => alert(msg))
  .catch(err => alert("Erreur worker : " + err));
}
</script>

<body class="bg-light">

<div class="container mt-4 mb-5">

  <h1 class="mb-4 text-center">⛽ Classement des stations</h1>

  <div class="input-group mb-3">

    <input id="adresseInput" class="form-control"
         placeholder="Entrez un code postal ou une adresse">
    <ul id="autocompleteList" 
        class="list-group position-absolute" 
        style="z-index: 2000;
        top:100%; left:0; width:100%;"
    ></ul> 
    <button class="btn btn-success" onclick="calculerDepuisSaisie()">OK</button> 
    <button class="btn btn-primary" onclick="geolocaliser()">📍 Me localiser</button>

  </div>
  
  <div id="summary" class="alert alert-secondary text-center"></div>

  <div id="status" class="alert alert-info text-center">⏳ Chargement…</div>

  <table id="table" class="table table-striped table-hover table-bordered align-middle" style="display:none;">
    <thead class="table-dark">
      <tr>
        <th>Rang</th>
        <th>Station</th>
        <th>Adresse</th>
        <th>CP</th>
        <th>Ville</th>
        <th>Prix (€/L)</th>
        <th>Distance (km)</th>
        <th>Prix total (€)</th>
        <th>Prix pondéré (€/L)</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
  async function geolocaliser() {
    if (!navigator.geolocation) { alert("Géolocalisation non supportée."); return; }
    navigator.geolocation.getCurrentPosition(async pos => {
    const lat = pos.coords.latitude, lon = pos.coords.longitude;
    const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`;
    const res = await fetch(url, { headers:{"User-Agent":"prixcarb"}});
    const json = await res.json();
    const addr = json.address;
    const voie = addr.road ?? addr.pedestrian ?? addr.path ?? "";
    const numero = addr.house_number ? addr.house_number + " " : "";
    const cp = addr.postcode ?? "";
    const ville = addr.city ?? addr.town ?? addr.village ?? "";
    const adresseCourte = `${numero}${voie}, ${cp} ${ville}`;
    document.getElementById("adresseInput").value = adresseCourte;
    document.getElementById("autocompleteList").innerHTML = "";  
    }, err => { alert("Géolocalisation refusée."); }); 
  }

  async function calculerDepuisSaisie() {
    try {
      const texte = document.getElementById("adresseInput").value.trim();
      if (!texte) { alert("Veuillez entrer une adresse ou un CP."); return; }
      const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(texte)}&format=json&addressdetails=1&limit=1`;
      const res = await fetch(url, { headers:{"User-Agent":"prixcarb"}});
      const json = await res.json();
      if (json.length === 0) { alert("Adresse introuvable."); return; }
      const addr = json[0].address;
      const voie = addr.road ?? "";
      const numero = addr.house_number ? addr.house_number + " " : "";
      const cp = addr.postcode ?? "";
      const ville = addr.city ?? addr.town ?? addr.village ?? "";
      const adresseCourte = `${numero}${voie}, ${cp} ${ville}`;
      document.getElementById("adresseInput").value = adresseCourte;
      document.getElementById("autocompleteList").innerHTML = "";
    } catch(err) { alert("Erreur recherche : " + err); }
  }

  // ------------------------------------------------------
// AUTOCOMPLÉTION avec API Adresse (gouv.fr)
// ------------------------------------------------------
let autocompleteTimeout = null;

document.getElementById("adresseInput").addEventListener("input", function () {
    const query = this.value.trim();
    if (!query) {
        document.getElementById("autocompleteList").innerHTML = "";
        return;
    }

    clearTimeout(autocompleteTimeout);
    autocompleteTimeout = setTimeout(() => autocomplete(query), 250);
});

async function autocomplete(query) {
    const url =
        `https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(query)}&limit=5`;

    try {
        const res = await fetch(url);
        const json = await res.json();

        const list = document.getElementById("autocompleteList");
        list.innerHTML = "";

        json.features.forEach(feat => {

            const props = feat.properties;
            const label = props.label;        // Exemple : "25 Rue Thomas Lemaître 92000 Nanterre"
            const voie = props.name;          // Exemple : "Rue Thomas Lemaître"
            const cp = props.postcode;
            const ville = props.city;

            const adresseCourte = `${voie}, ${cp} ${ville}`;

            const li = document.createElement("li");
            li.className = "list-group-item";
            li.textContent = adresseCourte;

            li.onclick = () => {
                document.getElementById("adresseInput").value = adresseCourte;
                list.innerHTML = "";
            };

            list.appendChild(li);
        });

    } catch (e) {
        console.error("Erreur autocomplétion", e);
    }
}
  
  // --------------------------------------------------
  // Chargement JSON + Calculs + Tri + Affichage
  // --------------------------------------------------

  async function charger() {
    const status = document.getElementById("status");
    const table  = document.getElementById("table");

  try {
    const res = await fetch("stations.json", { cache:"no-cache" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const rows = await res.json();
    if (!Array.isArray(rows)) throw new Error("JSON invalide");
    
    // Nombre de stations = nombre de lignes
    const nbStations = rows.length;

    const CONSO  = 10;   // L/100 km
    const VOLUME = 50;   // L

    // Convertit les données brutes en données affichables
    const data = rows.map(r => {
      // Prix (corriger milli‑euros si <0.1)
      const pRaw    = (typeof r.prix === "number") ? r.prix : Number(r.prix);
      const prixEur = Number.isFinite(pRaw) ? (pRaw < 0.1 ? pRaw*1000 : pRaw) : 0;

      // Distance
      const dRaw    = (typeof r.distance === "number") ? r.distance : Number(r.distance);
      const distKm  = Number.isFinite(dRaw) ? dRaw : 0;

      // Coût total & Prix pondéré
      const coutTotal   = prixEur*VOLUME + ((2*distKm/100)*CONSO*prixEur);
      const prixPondere = coutTotal / VOLUME;

      return {
        station    : r.station, 
        adresse    : r.adresse,
        cp         : r.cp ?? "",
        ville      : r.ville ?? "",
        prix       : prixEur,
        distance   : distKm,
        prixTotal  : coutTotal,
        prixPondere: prixPondere
      };
    });

    // Charger tri mémorisé
    let triCol = localStorage.getItem("triCol") ?? "prixPondere";
    let triDir = localStorage.getItem("triDir") ?? "asc";

    appliquerTri(data, triCol, triDir);

    // Afficher lignes
    const tbody = table.querySelector("tbody");
    remplirTableau(data, tbody);

    // Activer tri cliquable
    activerTri(table, data, triCol, triDir);

    
    // ---------------------------------------
    // AFFICHAGE DU RÉSUMÉ
    // ---------------------------------------
    const summary = document.getElementById("summary");
    if (summary) {
       summary.textContent = `${nbStations} stations SP95-E10 trouvées`;
       }

    status.style.display = "none";
    table.style.display  = "table";

  } catch (e) {
    if (status) status.textContent = "❌ Erreur : " + e.message;
    console.error(e);
  }
}


// --------------------------------------------------
// Construction visuelle d'une ligne <tr>
// --------------------------------------------------

function buildRow(obj, i) {
  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td>${i+1}</td>
    <td>${obj.station}</td>
    <td>${obj.adresse}</td>
    <td>${obj.cp}</td>
    <td>${obj.ville}</td>
    <td>${obj.prix.toFixed(3)}</td>
    <td>${obj.distance.toFixed(2)}</td>
    <td>${obj.prixTotal.toFixed(2)}</td>
    <td>${obj.prixPondere.toFixed(3)}</td>
  `;
  return tr;
}

function remplirTableau(data, tbody) {
  tbody.innerHTML = "";
  data.forEach((o,i) => tbody.appendChild(buildRow(o,i)));
}

// --------------------------------------------------
// Tri principal + tri secondaire + tri tertiaire
// --------------------------------------------------

function appliquerTri(data, col, dir) {
  const sens = (dir === "asc" ? 1 : -1);

  data.sort((a,b) => {
    // 1) Tri principal
    const c1 = compare(a[col], b[col]) * sens;
    if (c1 !== 0) return c1;

    // 2) Tri secondaire : distance
    const c2 = compare(a.distance, b.distance);
    if (c2 !== 0) return c2;

    // 3) Tri tertiaire : prix simple
    const c3 = compare(a.prix, b.prix);
    return c3;
  });
}

function compare(a,b) {
  const na = Number(a), nb = Number(b);
  if (!Number.isFinite(na) && !Number.isFinite(nb)) return 0;
  if (!Number.isFinite(na)) return 1;
  if (!Number.isFinite(nb)) return -1;
  return na - nb;
}

// --------------------------------------------------
// Activer le tri SUR 3 COLONNES SEULEMENT :
// Prix (col 5), Distance (6), Prix pondéré (8)
// --------------------------------------------------

function activerTri(table, data, triCol, triDir) {
  const tbody   = table.querySelector("tbody");
  const headers = table.querySelectorAll("th");

  // colonnes triables (alignées sur ton <thead>)
  const COL = {
    5: "prix",
    6: "distance",
    8: "prixPondere"
  };

  // marquage visuel
  Object.entries(COL).forEach(([idx,key]) => {
    headers[idx].classList.add("sortable-header");
    if (key === triCol) headers[idx].classList.add(triDir === "asc" ? "sort-asc" : "sort-desc");
  });

  headers.forEach((th, idx) => {
    if (!(idx in COL)) return; // ignorer autres colonnes

    const key = COL[idx];

    th.addEventListener("click", () => {
      let col = key;
      let oldCol = localStorage.getItem("triCol") ?? "prixPondere";
      let oldDir = localStorage.getItem("triDir") ?? "asc";

      // sens du tri
      let dir = (oldCol === col) ? (oldDir==="asc"?"desc":"asc") : "asc";

      // mémoriser
      localStorage.setItem("triCol", col);
      localStorage.setItem("triDir", dir);

      // appliquer tri
      appliquerTri(data, col, dir);
      remplirTableau(data, tbody);

      // mettre à jour flèches
      headers.forEach(h=>h.classList.remove("sort-asc","sort-desc"));
      th.classList.add(dir==="asc" ? "sort-asc":"sort-desc");
    });
  });
}

charger();
</script>

</body>
</html>
