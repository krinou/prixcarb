<script>

async function chargerStationsTousDeps(deps, carburant, userLat, userLon) {
   const baseUrls = [
         "data/latest/",
         "https://krinou.github.io/prixcarb/data/latest/",
         "https://raw.githubusercontent.com/krinou/prixcarb/main/data/latest/"
         ];

for (const baseUrl of baseUrls) {
    const ts = Date.now();
    const urls = deps.map(dep => `${baseUrl}${dep}.json?ts=${ts}`);
    const results = await Promise.all(
      urls.map(url =>
        fetch(url, { cache: "no-store" })
          .then(r => {
            if (!r.ok) {
              console.warn("Erreur HTTP :", r.status, url);
              return null;
            }
            return r.json();
          })
          .catch(err => {
            console.warn("Erreur fetch :", url, err);
            return null;
          })
      )
    );

      const fichiersOk = results.filter(x => x != null);

      if (fichiersOk.length > 0) {
         console.log("Chargement OK depuis :", baseUrl);
         console.log("Nombre de fichiers chargés :", fichiersOk.length, "/", deps.length);
         const stations = fichiersOk.flatMap(json => json);
         // Calcul dynamique
         const VOLUME = 50, CONSO = 10;
         return stations
           .filter(st => st.carburants && st.carburants[carburant] != null)
           .map(st => {
             const prix = parseFloat(st.carburants[carburant].valeur);
             const dist = haversine(userLat, userLon, st.latitude, st.longitude);
             const coutTotal = prix * VOLUME + (2 * dist / 100) * CONSO * prix;
             const prixPondere = coutTotal / VOLUME;
             return {
                station : st.nom ?? st.enseigne ?? "Inconnue",
                adresse : st.adresse ?? "",
                cp      : st.cp ?? st.code_postal ?? "",
                ville   : st.ville ?? "",
                prix,
                distance: dist,
                prixTotal: coutTotal,
                prixPondere,
                maj_gouv: st.carburants?.[carburant]?.maj ?? null
              };
          });
       }
       console.warn("Aucun fichier trouvé depuis :", baseUrl);
       return [];
     }
     console.error("Aucun fichier chargé depuis aucune source.");
     return [];
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a =
    Math.sin(dLat / 2) ** 2 +
    Math.cos(lat1 * Math.PI / 180) *
    Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLon / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

async function afficherStationsBrut() {
  const statusEl = document.getElementById("status");
  const table = document.getElementById("table");

  statusEl.style.display = "block";
  statusEl.className = "alert alert-info text-center";
  statusEl.textContent = "⏳ Chargement des résultats…";

  // 1. Adresse ou géolocalisation
  let adresse = (currentAdresse || document.getElementById("adresseInput").value || "").trim();
  if (!adresse) {
    statusEl.className = "alert alert-warning text-center";
    statusEl.textContent = "⚠️ Saisis une adresse ou utilise 📍 Me localiser.";
    return;
  }

  // 2. Carburant
  const carburant = document.getElementById("carburantSelect")?.value || "E10";


  // 1) Si coordonnées absentes, on géocode automatiquement l'adresse
  try {
       if (userLat == null || userLon == null) {
          const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(adresse)}&format=json&addressdetails=1&limit=1`;
          const res = await fetch(url, { headers: { "User-Agent": "prixcarb" } });
          const json = await res.json();
          if (!json.length) {
             statusEl.className = "alert alert-warning text-center";
             statusEl.textContent = "⚠️ Adresse introuvable.";
             return;
             }
          userLat = parseFloat(json[0].lat);
          userLon = parseFloat(json[0].lon);
          // on met aussi à jour l'adresse "propre"
         const addr = json[0].address || {};
         const voie = addr.road ?? addr.pedestrian ?? addr.path ?? "";
         const numero = addr.house_number ? addr.house_number + " " : "";
         const cp = addr.postcode ?? "";
         const ville = addr.city ?? addr.town ?? addr.village ?? "";
         const adresseCourte = `${numero}${voie}, ${cp} ${ville}`.trim();
         if (adresseCourte) {
            document.getElementById("adresseInput").value = adresseCourte;
            currentAdresse = adresseCourte;
            }
         const dep = cp.substring(0, 2);
         const voisins = [dep, ...(await getDepsVoisins(dep))].filter((v, i, a) => v && a.indexOf(v) === i);
         afficherDepsLimitrophes(dep, voisins);
       }
       // 3. Départements à charger
       const deps = Array.isArray(currentVoisins) ? currentVoisins : [];
       if (deps.length === 0) {
           statusEl.className = "alert alert-warning text-center";
           statusEl.textContent = "⚠️ Départements non déterminés. Utiliser📍Me localiser ou saisir adresse pour calculer les départements limitrophes.";
           return;
           }

       // 4. Géocodage (latitude/longitude utilisateur)
       // (à adapter selon ta logique, ici on suppose que tu as déjà userLat/userLon)
       if (userLat == null || userLon == null) {
          alert("Coordonnées utilisateur non définies !");
          return;
          }

       // 5. Chargement des stations
       console.log("Coordonnées utilisateur :", userLat, userLon)
       console.log("Départements chargés :", deps);
       const data = await chargerStationsTousDeps(deps, carburant, userLat, userLon);
       // Tri, affichage, etc.
       let triCol = localStorage.getItem("triCol") ?? "prixPondere";
       let triDir = localStorage.getItem("triDir") ?? "asc";
       appliquerTri(data, triCol, triDir);
       const tbody = table.querySelector("tbody");
       remplirTableau(data, tbody);
       afficherConseil(data);
       
       activerTri(table, data, triCol, triDir);
       const summary = document.getElementById("summary");
       if (summary) summary.textContent = `${data.length} stations ${carburant} trouvées`;
          statusEl.style.display = "none";
          table.style.display = "table";
      } catch (e) {
          statusEl.className = "alert alert-danger text-center";
          statusEl.textContent = "❌ Erreur : " + (e?.message || e);
          console.error(e);
          }
}
</script>

<script>
  let depsLimitrophes = null;
  let currentAdresse = "";      // dernière adresse validée
  let currentVoisins = [];      // derniers départements limitrophes calculés
  let userLat = null, userLon = null;

  async function chargerDepartements() {
    if (!depsLimitrophes) {
        depsLimitrophes = await fetch("departements.json")
            .then(r => r.json());
    }
    return depsLimitrophes;
  }

  async function getDepsVoisins(dep) {
    const deps = await chargerDepartements();
    return deps[dep] ?? [];
  }

  function afficherDepsLimitrophes(dep, voisins) {
    currentVoisins = voisins || [];   // mémorise
    const zone = document.getElementById("depsLimitrophes");

    const txt = voisins.join(", ");
    zone.innerHTML = `<strong>Départements limitrophes :</strong> ${txt}`;
  }

  async function geolocaliser() {
    if (!navigator.geolocation) { alert("Géolocalisation non supportée."); return; }
    navigator.geolocation.getCurrentPosition(async pos => {
    const lat = pos.coords.latitude, lon = pos.coords.longitude;
    const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`;
    userLat = lat;
    userLon = lon;
    const res = await fetch(url, { headers:{"User-Agent":"prixcarb"}});
    const json = await res.json();
    const addr = json.address;
    const voie = addr.road ?? addr.pedestrian ?? addr.path ?? "";
    const numero = addr.house_number ? addr.house_number + " " : "";
    const cp = addr.postcode ?? "";
    const ville = addr.city ?? addr.town ?? addr.village ?? "";
    const adresseCourte = `${numero}${voie}, ${cp} ${ville}`;
    document.getElementById("adresseInput").value = adresseCourte;
    currentAdresse = adresseCourte;
    document.getElementById("autocompleteList").innerHTML = "";
    const dep = cp.substring(0, 2);
    const voisins = await getDepsVoisins(dep);
    afficherDepsLimitrophes(dep, voisins);
    console.log("Départements limitrophes :", voisins);

    document.getElementById("status").style.display = "block";
    document.getElementById("status").textContent = "⏳ Chargement des résultats…";
    }, err => { alert("Géolocalisation refusée."); });
  }

      const adresseCourte = `${numero}${voie}, ${cp} ${ville}`;
      document.getElementById("adresseInput").value = adresseCourte;
      currentAdresse = adresseCourte;

      const dep = cp.substring(0, 2);

      afficherDepsLimitrophes(dep, voisins);

      const statusEl = document.getElementById("status");
      statusEl.style.display = "block";
      statusEl.className = "alert alert-info text-center";
      statusEl.textContent = "⏳ Chargement des résultats…";

      userLat = parseFloat(json[0].lat);

    } catch(err) { alert("Erreur recherche : " + err); }

  // ------------------------------------------------------
// AUTOCOMPLÉTION avec API Adresse (gouv.fr)
// ------------------------------------------------------
let autocompleteTimeout = null;

document.getElementById("adresseInput").addEventListener("input", function () {
    const query = this.value.trim();
    if (!query) {
        document.getElementById("autocompleteList").innerHTML = "";
        return;
    }
    clearTimeout(autocompleteTimeout);
    autocompleteTimeout = setTimeout(() => autocomplete(query), 250);
});

async function autocomplete(query) {
    // ✅ 1. Filtre minimal
    if (query.length < 3) {
        document.getElementById("autocompleteList").innerHTML = "";
        return;
    }

    let url;

    if (/^\d+$/.test(query)) {
       url = `https://api-adresse.data.gouv.fr/search/?q=${query}&limit=20`;
    }  else {
       url = `https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(query)}&limit=20`;
    }

    try {
        const res = await fetch(url);
        if (!res.ok) {
            console.warn("API erreur :", res.status);
            return;
        }
      
        const json = await res.json();
        if (!json || !Array.isArray(json.features)) {
            console.warn("Réponse invalide :", json);
            return;
        }

        const list = document.getElementById("autocompleteList");
        list.innerHTML = "";

        if (/^\d+$/.test(query)) {
          json.features = json.features.filter(f =>
            f.properties.postcode &&
            f.properties.postcode.startsWith(query)
            );
        }
      
        json.features.forEach(feat => {
            const props = feat.properties;
            const label = props.label;        // Exemple : "25 Rue Thomas Lemaître 92000 Nanterre"
            const voie = props.name;          // Exemple : "Rue Thomas Lemaître"
            const cp = props.postcode;
            const ville = props.city;

            const adresseCourte = `${voie}, ${cp} ${ville}`;

            const li = document.createElement("li");
            li.className = "list-group-item";
            li.textContent = adresseCourte;

            li.onclick = async () => {
                document.getElementById("adresseInput").value = adresseCourte;
                currentAdresse = adresseCourte;
                list.innerHTML = "";
                userLon = feat.geometry.coordinates[0];
                userLat = feat.geometry.coordinates[1];
                const dep = cp.substring(0, 2);
                const voisins = [dep, ...(await getDepsVoisins(dep))].filter((v, i, a) => v && a.indexOf(v) === i);
                afficherDepsLimitrophes(dep, voisins);
                console.log("Départements limitrophes :", voisins);
            };
            list.appendChild(li);
        });

    } catch (e) {
        console.error("Erreur autocomplétion", e);
    }
}

function buildRow(obj, i) {
  console.log("buildRow maj_gouv =", obj.maj_gouv);
  const age = agePrixEnJours(obj.maj_gouv);
  const tr = document.createElement("tr");
  if (age > 21) {
    tr.classList.add("prix-perime");
    }
  else if (age > 15) {
          tr.classList.add("prix-ancien");
          }
  
  tr.innerHTML = `
    <td>${i+1}</td>
    <td>${obj.station}</td>
    <td>${obj.adresse}</td>
    <td>${obj.cp}</td>
    <td>${obj.ville}</td>
    <td>${obj.prix != null ? obj.prix.toFixed(3) : "-"}</td>
    <td>${obj.distance != null ? obj.distance.toFixed(2) : "-"}</td>
    <td>${obj.prixTotal != null ? obj.prixTotal.toFixed(2) : "-"}</td>
    <td>${obj.prixPondere != null ? obj.prixPondere.toFixed(3) : "-"}</td>
    <td>
       ${age > 21 ? '🔺 ' : age > 15 ? '⚠️ ' : ''}
       ${formatDateFR(obj.maj_gouv)}
    </td>
  `;
  return tr;
}

function formatDateFR(maj) {
  if (!maj) return "";

  // maj attendu: "YYYY-MM-DD HH:MM:SS"
  // On ne dépend pas de Date() (qui peut interpréter selon le navigateur)
  const m = String(maj).match(/^(\d{4})-(\d{2})-(\d{2})(?:[ T].*)?$/);
  if (!m) return String(maj); // fallback si format inattendu

  const yy = m[1].slice(-2);
  const mm = m[2];
  const dd = m[3];
  return `${dd}/${mm}/${yy}`;
}

function agePrixEnJours(maj) {
    if (!maj) return 999;

    const dateMaj = new Date(maj.replace(" ", "T"));
    const maintenant = new Date();

    return Math.floor(
        (maintenant - dateMaj) / (1000 * 60 * 60 * 24)
    );
}
  
function afficherConseil(data) {
    if (!data || data.length === 0) return;
    const div = document.getElementById("conseilPrixCarb");
    const dataValides = data.filter(  
                                     st => agePrixEnJours(st.maj_gouv) <= 21
                                   );
  
    if (dataValides.length === 0) {
       return;
      }
  
    const stationMoinsChere =
        [...dataValides].sort((a,b) => a.prixTotal - b.prixTotal)[0];

    const stationPlusProche =
        [...dataValides].sort((a,b) => a.distance - b.distance)[0];

    const stationPrixLitre =
        [...dataValides].sort((a,b) => a.prix - b.prix)[0];

    let html = '';
    if (
        stationMoinsChere.station === stationPlusProche.station &&
        stationMoinsChere.station === stationPrixLitre.station
    ) {

        html = `
        <div class="conseil-card">
            <h5>🏆 Station idéale</h5>
            <p>
                La station la plus proche est également celle qui propose
                le prix au litre le plus bas et le plein le moins cher.
            </p>
        </div>`;
    }
    else {
        const perteProche =
            stationPlusProche.prixTotal - stationMoinsChere.prixTotal;

        const pertePrix =
            stationPrixLitre.prixTotal - stationMoinsChere.prixTotal;

        html = `
        <div class="conseil-card">

            <h5>🏆 Conseil PrixCarb</h5>

            <p>
                Pour faire le maximum d'économies sur un plein de 50 litres,
                rendez-vous à
                <strong>${stationMoinsChere.station}</strong>
                située à
                <strong>${stationMoinsChere.distance.toFixed(1)} km</strong>.
            </p>

            <p>
                Coût du plein :
                <strong>
                  ${stationMoinsChere.prixTotal.toFixed(2)} €
                  (${stationMoinsChere.prix.toFixed(3)} €/L)
                </strong>.
            </p>
        `;

        if (stationPlusProche.station !== stationMoinsChere.station) {

            html += `
            <p>
                📍 En choisissant la station la plus proche,
                vous paierez
                <strong>${perteProche.toFixed(2)} € de plus</strong>.
            </p>`;
        }

        if (stationPrixLitre.station !== stationMoinsChere.station) {
            html += `
            <p>
                ⛽ En choisissant la station au prix au litre le plus bas,
                vous paierez
                <strong>${pertePrix.toFixed(2)} € de plus</strong>.
            </p>`;
        }

        html += '</div>';
    }

    div.innerHTML = html;
    div.style.display = 'block';
}
  
function remplirTableau(data, tbody) {
  tbody.innerHTML = "";
  const statusEl = document.getElementById("status");
  
  data.forEach((o,i) => tbody.appendChild(buildRow(o,i)));
  if (!data.length) {
      statusEl.className = "alert alert-warning text-center";
      statusEl.textContent = "⚠️ Aucune station trouvée.";
      return;
     }
}

// --------------------------------------------------
// Tri principal + tri secondaire + tri tertiaire
// --------------------------------------------------

function appliquerTri(data, col, dir) {
  const sens = (dir === "asc" ? 1 : -1);

  data.sort((a,b) => {
    // 1) Tri principal
    const c1 = compare(a[col], b[col]) * sens;
    if (c1 !== 0) return c1;

    // 2) Tri secondaire : distance
    const c2 = compare(a.distance, b.distance);
    if (c2 !== 0) return c2;

    // 3) Tri tertiaire : prix simple
    const c3 = compare(a.prix, b.prix);
    return c3;
  });
}

function compare(a,b) {
  const na = Number(a), nb = Number(b);
  if (!Number.isFinite(na) && !Number.isFinite(nb)) return 0;
  if (!Number.isFinite(na)) return 1;
  if (!Number.isFinite(nb)) return -1;
  return na - nb;
}

// --------------------------------------------------
// Activer le tri SUR 3 COLONNES SEULEMENT :
// Prix (col 5), Distance (6), Prix pondéré (8)
// --------------------------------------------------

function activerTri(table, data, triCol, triDir) {
  const tbody   = table.querySelector("tbody");
  const headers = table.querySelectorAll("th");

  // colonnes triables (alignées sur ton <thead>)
  const COL = {
    5: "prix",
    6: "distance",
    8: "prixPondere"
  };

  // marquage visuel
  Object.entries(COL).forEach(([idx,key]) => {
    headers[idx].classList.add("sortable-header");
    if (key === triCol) headers[idx].classList.add(triDir === "asc" ? "sort-asc" : "sort-desc");
  });

  headers.forEach((th, idx) => {
    if (!(idx in COL)) return; // ignorer autres colonnes

    const key = COL[idx];

    if (th.dataset.triActive) return;
    th.dataset.triActive = "1";

    th.addEventListener("click", () => {
      let col = key;
      let oldCol = localStorage.getItem("triCol") ?? "prixPondere";
      let oldDir = localStorage.getItem("triDir") ?? "asc";

      // sens du tri
      let dir = (oldCol === col) ? (oldDir==="asc"?"desc":"asc") : "asc";

      // mémoriser
      localStorage.setItem("triCol", col);
      localStorage.setItem("triDir", dir);

      // appliquer tri
      appliquerTri(data, col, dir);
      remplirTableau(data, tbody);

      // mettre à jour flèches
      headers.forEach(h=>h.classList.remove("sort-asc","sort-desc"));
      th.classList.add(dir==="asc" ? "sort-asc":"sort-desc");
    });
  });
}

// Au chargement : ne rien afficher
document.getElementById("table").style.display = "none";
document.getElementById("status").style.display = "none";

</script>
